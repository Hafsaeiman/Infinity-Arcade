<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>2048</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#08050f;--panel:#10081a;--border:#2e1a4a;--text:#f5f0ff;--muted:#6a5a8a;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;touch-action:none;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow:hidden;}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 10% 10%,rgba(255,100,0,0.1) 0%,transparent 45%),
    radial-gradient(ellipse at 90% 90%,rgba(200,0,255,0.1) 0%,transparent 45%),
    radial-gradient(ellipse at 50% 50%,rgba(255,220,0,0.05) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}
#app{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:12px;padding:16px 12px env(safe-area-inset-bottom,12px);width:100%;max-width:420px;}

#logo{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(26px,7vw,38px);letter-spacing:4px;
  background:linear-gradient(90deg,#ff6b00,#ffcc00,#ff00cc,#6600ff,#ff6b00);
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:logo-shift 4s linear infinite;
  filter:drop-shadow(0 0 16px rgba(255,150,0,0.5));
}
@keyframes logo-shift{0%{background-position:0%}100%{background-position:300%}}

.hud{display:flex;gap:8px;width:100%;}
.hud-pill{
  flex:1;border-radius:10px;padding:8px 10px;display:flex;flex-direction:column;gap:1px;
  position:relative;overflow:hidden;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(4px);
}
.hud-pill::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,200,0,0.6),transparent);}
.hp-label{font-size:clamp(7px,1.8vw,9px);letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.hp-val{font-family:'Orbitron',sans-serif;font-size:clamp(14px,4vw,20px);font-weight:700;}
.c-orange{color:#ff9500;text-shadow:0 0 10px #ff9500,0 0 20px rgba(255,149,0,.3);}
.c-violet{color:#cc44ff;text-shadow:0 0 10px #cc44ff,0 0 20px rgba(200,68,255,.3);}
.c-lime{color:#aaff00;text-shadow:0 0 10px #aaff00,0 0 20px rgba(170,255,0,.3);}

#board{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:clamp(6px,2vw,10px);
  border-radius:16px;padding:clamp(8px,2.5vw,14px);
  width:100%;touch-action:none;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 40px rgba(200,68,255,0.12),0 0 80px rgba(255,149,0,0.06);
}
.tile{
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-weight:700;aspect-ratio:1;
  font-size:clamp(13px,4.5vw,22px);transition:all .12s;user-select:none;
  position:relative;overflow:hidden;
}
/* Each value gets its own vivid identity */
.t0{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);}
.t2{background:linear-gradient(135deg,#1a0533,#2a0a44);border:1px solid #5a2a8a;color:#cc88ff;text-shadow:0 0 8px #cc88ff;}
.t4{background:linear-gradient(135deg,#001a33,#003366);border:1px solid #0066cc;color:#44aaff;text-shadow:0 0 8px #44aaff;}
.t8{background:linear-gradient(135deg,#002200,#004400);border:1px solid #00aa00;color:#44ff44;text-shadow:0 0 8px #44ff44;}
.t16{background:linear-gradient(135deg,#1a1100,#332200);border:1px solid #aa6600;color:#ffcc00;text-shadow:0 0 8px #ffcc00;}
.t32{background:linear-gradient(135deg,#1a0800,#331500);border:1px solid #cc4400;color:#ff8833;text-shadow:0 0 8px #ff8833;}
.t64{background:linear-gradient(135deg,#1a0010,#330020);border:1px solid #cc0066;color:#ff44aa;text-shadow:0 0 8px #ff44aa;}
.t128{
  background:linear-gradient(135deg,#0d1a33,#001a4d);border:1px solid #0055ff;color:#55aaff;
  font-size:clamp(11px,3.5vw,18px);
  box-shadow:0 0 16px rgba(0,85,255,0.4),inset 0 0 12px rgba(0,85,255,0.1);
}
.t256{
  background:linear-gradient(135deg,#1a0033,#2a0055);border:1px solid #7700ff;color:#bb66ff;
  font-size:clamp(11px,3.5vw,18px);
  box-shadow:0 0 16px rgba(119,0,255,0.4),inset 0 0 12px rgba(119,0,255,0.1);
}
.t512{
  background:linear-gradient(135deg,#001a0d,#003322);border:1px solid #00cc66;color:#00ff99;
  font-size:clamp(11px,3.5vw,18px);
  box-shadow:0 0 16px rgba(0,204,102,0.4),inset 0 0 12px rgba(0,204,102,0.1);
}
.t1024{
  background:linear-gradient(135deg,#1a0d00,#331a00);border:1px solid #ff8800;color:#ffcc44;
  font-size:clamp(9px,2.8vw,14px);
  box-shadow:0 0 20px rgba(255,136,0,0.5),inset 0 0 16px rgba(255,136,0,0.1);
}
.t2048c{
  background:linear-gradient(135deg,#ff6600,#ff00cc,#6600ff,#00ccff);
  color:#fff;font-size:clamp(9px,2.5vw,13px);font-weight:900;
  box-shadow:0 0 30px rgba(255,100,0,0.6),0 0 60px rgba(200,0,255,0.4);
  animation:tile-pulse 1s ease-in-out infinite alternate;
}
@keyframes tile-pulse{from{box-shadow:0 0 20px rgba(255,100,0,0.6);}to{box-shadow:0 0 40px rgba(255,100,0,0.9),0 0 80px rgba(200,0,255,0.5);}}

.overlay{position:fixed;inset:0;background:rgba(8,5,15,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:20;opacity:0;pointer-events:none;transition:opacity .4s;padding:20px;}
.overlay.show{opacity:1;pointer-events:all;}
.ov-title{font-family:'Orbitron',sans-serif;font-size:clamp(24px,7vw,36px);font-weight:900;letter-spacing:4px;animation:glow-pulse 1s ease-in-out infinite alternate;}
@keyframes glow-pulse{from{text-shadow:0 0 20px currentColor;}to{text-shadow:0 0 50px currentColor,0 0 90px currentColor;}}
.ov-stats{font-size:13px;color:#8a7aaa;letter-spacing:2px;text-align:center;line-height:2.2;}
.ov-stats b{color:#cc44ff;text-shadow:0 0 8px #cc44ff;}
.ov-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.ov-btn{
  padding:11px 24px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;
  border-radius:8px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:all .2s;
}
.ov-btn.win{border:1px solid #ff9500;background:rgba(255,149,0,.1);color:#ff9500;box-shadow:0 0 14px rgba(255,149,0,.3);}
.ov-btn.lose{border:1px solid #ff4488;background:rgba(255,68,136,.1);color:#ff4488;box-shadow:0 0 14px rgba(255,68,136,.3);}

.ctrl-row{display:flex;gap:8px;width:100%;}
.ctrl-btn{
  flex:1;padding:10px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;
  border-radius:8px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:all .2s;
}
.btn-new{border:1px solid rgba(255,149,0,.5);background:rgba(255,149,0,.08);color:#ff9500;text-shadow:0 0 6px #ff9500;}
.btn-undo{border:1px solid rgba(170,255,0,.4);background:rgba(170,255,0,.06);color:#aaff00;text-shadow:0 0 6px #aaff00;}
.hint{font-size:clamp(9px,2.2vw,11px);color:var(--muted);letter-spacing:2px;text-align:center;}
</style>
</head>
<body>
<div id="app">
  <div id="logo">2048</div>
  <div class="hud">
    <div class="hud-pill"><div class="hp-label">Score</div><div class="hp-val c-orange" id="score">0</div></div>
    <div class="hud-pill"><div class="hp-label">Best</div><div class="hp-val c-violet" id="best">0</div></div>
    <div class="hud-pill"><div class="hp-label">Moves</div><div class="hp-val c-lime" id="moves">0</div></div>
  </div>
  <div id="board"></div>
  <div class="overlay" id="overlay">
    <div class="ov-title" id="ov-title"></div>
    <div class="ov-stats" id="ov-stats"></div>
    <div class="ov-btns"><button class="ov-btn" id="ov-btn" onclick="init()">↺ New Game</button></div>
  </div>
  <div class="ctrl-row">
    <button class="ctrl-btn btn-new" onclick="init()">↺ New Game</button>
    <button class="ctrl-btn btn-undo" onclick="undo()">↩ Undo</button>
  </div>
  <div class="hint">Swipe · Arrow keys to merge tiles · Reach 2048!</div>
</div>
<script>
let board,score=0,best=0,moves=0,prev=null;
function init(){
  board=Array.from({length:4},()=>Array(4).fill(0));
  score=0;moves=0;prev=null;addTile();addTile();
  document.getElementById('overlay').classList.remove('show');
  render();updateHUD();
}
function addTile(){
  const empty=[];board.forEach((r,y)=>r.forEach((v,x)=>{if(!v)empty.push({x,y});}));
  if(!empty.length)return;
  const{x,y}=empty[Math.floor(Math.random()*empty.length)];
  board[y][x]=Math.random()<.85?2:4;
}
function render(){
  const el=document.getElementById('board');el.innerHTML='';
  board.forEach(row=>row.forEach(val=>{
    const cell=document.createElement('div');
    cell.className='tile '+(val===2048?'t2048c':val?'t'+val:'t0');
    cell.textContent=val||'';el.appendChild(cell);
  }));
}
function updateHUD(){
  document.getElementById('score').textContent=score;
  document.getElementById('best').textContent=best;
  document.getElementById('moves').textContent=moves;
}
function slide(row){
  let r=row.filter(v=>v);
  for(let i=0;i<r.length-1;i++){if(r[i]===r[i+1]){score+=r[i]*2;r[i]*=2;r.splice(i+1,1);}}
  while(r.length<4)r.push(0);return r;
}
function move(dir){
  prev=board.map(r=>[...r]);let moved=false;
  if(dir==='left'||dir==='right'){
    board=board.map(row=>{const s=slide(dir==='right'?[...row].reverse():row);const n=dir==='right'?s.reverse():s;if(n.join()!==row.join())moved=true;return n;});
  }else{
    for(let x=0;x<4;x++){let col=board.map(r=>r[x]);const s=slide(dir==='down'?[...col].reverse():col);const n=dir==='down'?s.reverse():s;if(n.join()!==col.join())moved=true;n.forEach((v,y)=>board[y][x]=v);}
  }
  if(moved){moves++;if(score>best)best=score;addTile();render();updateHUD();
    if(board.some(r=>r.includes(2048)))showEnd('YOU WIN!',true);
    else if(!canMove())showEnd('GAME OVER',false);}
}
function canMove(){
  for(let y=0;y<4;y++)for(let x=0;x<4;x++){if(!board[y][x])return true;if(x<3&&board[y][x]===board[y][x+1])return true;if(y<3&&board[y][x]===board[y+1][x])return true;}return false;
}
function showEnd(title,win){
  document.getElementById('ov-title').textContent=title;
  document.getElementById('ov-title').style.color=win?'#ff9500':'#ff4488';
  document.getElementById('ov-stats').innerHTML=`Score <b>${score}</b> · Moves <b>${moves}</b>`;
  const btn=document.getElementById('ov-btn');btn.className='ov-btn '+(win?'win':'lose');
  document.getElementById('overlay').classList.add('show');
}
function undo(){if(prev){board=prev.map(r=>[...r]);render();}}
document.addEventListener('keydown',e=>{
  const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(m[e.key]){e.preventDefault();move(m[e.key]);}
});
let tx=0,ty=0;
document.getElementById('board').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('board').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<12&&Math.abs(dy)<12)return;
  move(Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up'));
},{passive:true});
init();
</script>
</body>
</html>
