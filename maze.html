<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>MAZE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#050a08;--panel:#080e0a;--border:#0a2010;--text:#e0ffe8;--muted:#3a6a4a;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;touch-action:none;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow:hidden;}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 30%,rgba(0,255,100,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 70%,rgba(255,200,0,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 10%,rgba(0,200,255,0.06) 0%,transparent 40%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,255,100,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,100,0.03) 1px,transparent 1px);
  background-size:30px 30px;pointer-events:none;z-index:0;
}
#app{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px 12px env(safe-area-inset-bottom,12px);width:100%;max-width:560px;}

#logo{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(20px,5vw,28px);letter-spacing:10px;
  background:linear-gradient(90deg,#00ff64,#00ffcc,#ffcc00,#ff6600,#00ff64);
  background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:logo-shift 4s linear infinite;
  filter:drop-shadow(0 0 14px rgba(0,255,100,0.5));
}
@keyframes logo-shift{0%{background-position:0%}100%{background-position:300%}}

.hud{display:flex;gap:8px;width:100%;}
.hud-pill{
  flex:1;border-radius:10px;padding:7px 10px;display:flex;flex-direction:column;gap:1px;
  position:relative;overflow:hidden;min-width:0;
  background:rgba(0,255,100,0.04);border:1px solid rgba(0,255,100,0.15);
}
.hud-pill::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,255,100,0.5),transparent);}
.hp-label{font-size:clamp(7px,1.8vw,9px);letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.hp-val{font-family:'Orbitron',sans-serif;font-size:clamp(13px,3.5vw,18px);font-weight:700;white-space:nowrap;}
.c-green{color:#00ff64;text-shadow:0 0 10px #00ff64,0 0 20px rgba(0,255,100,.3);}
.c-cyan{color:#00ffcc;text-shadow:0 0 10px #00ffcc,0 0 20px rgba(0,255,200,.3);}
.c-yellow{color:#ffcc00;text-shadow:0 0 10px #ffcc00,0 0 20px rgba(255,200,0,.3);}
.c-orange{color:#ff8800;text-shadow:0 0 10px #ff8800,0 0 20px rgba(255,136,0,.3);}

#lvl-row{display:flex;gap:5px;width:100%;}
.lvl-btn{
  flex:1;padding:7px 2px;font-family:'Orbitron',sans-serif;font-size:clamp(9px,2.2vw,11px);font-weight:700;letter-spacing:1px;
  border-radius:6px;border:1px solid rgba(0,255,100,0.15);background:rgba(0,255,100,0.04);
  cursor:pointer;color:var(--muted);transition:all .2s;line-height:1.3;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.lvl-btn.active{border-color:#00ff64;color:#00ff64;background:rgba(0,255,100,.08);box-shadow:0 0 10px rgba(0,255,100,.2);}

.canvas-wrap{
  position:relative;border-radius:12px;overflow:hidden;width:100%;
  border:1px solid rgba(0,255,100,0.25);
  box-shadow:0 0 30px rgba(0,255,100,0.15),0 0 60px rgba(255,200,0,0.05);
}
canvas{display:block;touch-action:none;}

.overlay{position:absolute;inset:0;background:rgba(5,10,8,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:20;opacity:0;pointer-events:none;transition:opacity .4s;border-radius:12px;padding:20px;}
.overlay.show{opacity:1;pointer-events:all;}
.ov-title{font-family:'Orbitron',sans-serif;font-size:clamp(20px,6vw,30px);font-weight:900;color:#00ff64;letter-spacing:4px;animation:glow-pulse 1s ease-in-out infinite alternate;}
@keyframes glow-pulse{from{text-shadow:0 0 20px currentColor;}to{text-shadow:0 0 50px currentColor,0 0 90px currentColor;}}
.ov-stats{font-size:13px;color:#3a6a4a;letter-spacing:2px;text-align:center;line-height:2.2;}
.ov-stats b{color:#00ffcc;text-shadow:0 0 8px #00ffcc;}
.ov-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.ov-btn{padding:10px 18px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);cursor:pointer;color:#3a6a4a;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:all .2s;}
.ov-btn.primary{border-color:#00ff64;color:#00ff64;background:rgba(0,255,100,.08);box-shadow:0 0 14px rgba(0,255,100,.25);}

.dpad-row{display:flex;gap:16px;align-items:center;}
.dpad{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:5px;width:clamp(140px,40vw,170px);}
.dpad button{
  aspect-ratio:1;font-size:clamp(15px,4vw,20px);border-radius:8px;
  border:1px solid rgba(0,255,100,0.25);background:rgba(0,255,100,0.06);
  cursor:pointer;color:#00ff64;display:flex;align-items:center;justify-content:center;
  transition:all .12s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;
  text-shadow:0 0 6px #00ff64;
}
.dpad button:active{transform:scale(.88);background:rgba(0,255,100,.18);box-shadow:0 0 12px rgba(0,255,100,.4);}
.side-btns{display:flex;flex-direction:column;gap:8px;}
.side-btn{padding:9px 16px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;border-radius:8px;border:1px solid rgba(0,255,100,.35);background:rgba(0,255,100,.06);cursor:pointer;color:#00ff64;touch-action:manipulation;-webkit-tap-highlight-color:transparent;white-space:nowrap;text-shadow:0 0 6px #00ff64;}
.side-btn.next{border-color:#ffcc00;color:#ffcc00;background:rgba(255,200,0,.06);text-shadow:0 0 6px #ffcc00;}
.hint{font-size:clamp(9px,2.2vw,11px);color:var(--muted);letter-spacing:2px;text-align:center;}
</style>
</head>
<body>
<div id="app">
  <div id="logo">MAZE</div>
  <div class="hud">
    <div class="hud-pill"><div class="hp-label">Level</div><div class="hp-val c-cyan" id="h-level">01</div></div>
    <div class="hud-pill"><div class="hp-label">Moves</div><div class="hp-val c-green" id="h-moves">000</div></div>
    <div class="hud-pill"><div class="hp-label">Best</div><div class="hp-val c-cyan" id="h-best">---</div></div>
    <div class="hud-pill"><div class="hp-label">Time</div><div class="hp-val c-orange" id="h-timer">00:00</div></div>
  </div>
  <div id="lvl-row"></div>
  <div class="canvas-wrap" id="wrap">
    <canvas id="canvas"></canvas>
    <div class="overlay" id="overlay">
      <div class="ov-title">ESCAPED!</div>
      <div class="ov-stats" id="ov-stats"></div>
      <div class="ov-btns">
        <button class="ov-btn" onclick="init()">↺ Retry</button>
        <button class="ov-btn primary" id="next-btn" style="display:none" onclick="nextLevel()">Next Level →</button>
      </div>
    </div>
  </div>
  <div class="dpad-row">
    <div class="dpad">
      <div></div><button id="btn-up">↑</button><div></div>
      <button id="btn-left">←</button><button id="btn-down">↓</button><button id="btn-right">→</button>
    </div>
    <div class="side-btns">
      <button class="side-btn" onclick="init()">↺ Restart</button>
      <button class="side-btn next" id="next-btn2" style="display:none" onclick="nextLevel()">Next →</button>
    </div>
  </div>
  <div class="hint">Arrow keys · WASD · Swipe canvas</div>
</div>
<script>
const LEVELS=[{cols:9,rows:9,label:'01'},{cols:13,rows:11,label:'02'},{cols:17,rows:13,label:'03'},{cols:21,rows:15,label:'04'},{cols:25,rows:19,label:'05'}];
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let lvl=0,moves=0,solved=false,bests=Array(5).fill(null);
let grid,cols,rows,px,py,CELL,trail=[],timerInt,startT;

// Level buttons
const lvlRow=document.getElementById('lvl-row');
LEVELS.forEach((l,i)=>{
  const b=document.createElement('button');
  b.className='lvl-btn'+(i===0?' active':'');
  b.innerHTML=`<span style="font-size:9px;display:block;color:var(--muted)">LVL</span>${l.label}`;
  b.onclick=()=>{lvl=i;init();updateLvlBtns();};
  lvlRow.appendChild(b);
});
function updateLvlBtns(){document.querySelectorAll('.lvl-btn').forEach((b,i)=>b.classList.toggle('active',i===lvl));}

function rnd(n){return Math.floor(Math.random()*n);}
function buildMaze(c,r){
  const g=Array.from({length:r},()=>Array.from({length:c},()=>({n:true,s:true,e:true,w:true,visited:false})));
  const dirs=[{dx:0,dy:-1,wall:'n',opp:'s'},{dx:0,dy:1,wall:'s',opp:'n'},{dx:1,dy:0,wall:'e',opp:'w'},{dx:-1,dy:0,wall:'w',opp:'e'}];
  const stack=[[0,0]];g[0][0].visited=true;
  while(stack.length){
    const[cx,cy]=stack[stack.length-1];
    const nb=dirs.filter(({dx,dy})=>{const nx=cx+dx,ny=cy+dy;return nx>=0&&ny>=0&&nx<c&&ny<r&&!g[ny][nx].visited;});
    if(nb.length){const{dx,dy,wall,opp}=nb[rnd(nb.length)];const nx=cx+dx,ny=cy+dy;g[cy][cx][wall]=false;g[ny][nx][opp]=false;g[ny][nx].visited=true;stack.push([nx,ny]);}else stack.pop();
  }return g;
}
function pad2(n){return String(n).padStart(2,'0');}

function init(){
  const{cols:c,rows:r}=LEVELS[lvl];cols=c;rows=r;grid=buildMaze(c,r);
  px=0;py=0;moves=0;solved=false;trail=[];
  const wrap=document.getElementById('wrap');
  const maxW=wrap.clientWidth-2,maxH=Math.min(window.innerHeight*.4,380);
  CELL=Math.max(12,Math.min(26,Math.floor(maxW/c),Math.floor(maxH/r)));
  canvas.width=c*CELL+1;canvas.height=r*CELL+1;
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('next-btn').style.display='none';
  document.getElementById('next-btn2').style.display='none';
  clearInterval(timerInt);startT=Date.now();
  timerInt=setInterval(()=>{if(!solved){const t=Math.floor((Date.now()-startT)/1000);document.getElementById('h-timer').textContent=pad2(Math.floor(t/60))+':'+pad2(t%60);}},500);
  updateHUD();
}
function updateHUD(){
  document.getElementById('h-level').textContent=LEVELS[lvl].label;
  document.getElementById('h-moves').textContent=String(moves).padStart(3,'0');
  document.getElementById('h-best').textContent=bests[lvl]!=null?String(bests[lvl]).padStart(3,'0'):'---';
}
function move(dx,dy){
  if(solved)return;
  const nx=px+dx,ny=py+dy;
  if(nx<0||ny<0||nx>=cols||ny>=rows)return;
  const cell=grid[py][px];
  if(dx===1&&cell.e)return;if(dx===-1&&cell.w)return;if(dy===1&&cell.s)return;if(dy===-1&&cell.n)return;
  trail.push({x:px,y:py});if(trail.length>22)trail.shift();
  px=nx;py=ny;moves++;updateHUD();
  if(px===cols-1&&py===rows-1)win();
}
function win(){
  solved=true;clearInterval(timerInt);
  const t=Math.floor((Date.now()-startT)/1000);
  const nb=!bests[lvl]||moves<bests[lvl];if(nb)bests[lvl]=moves;updateHUD();
  document.getElementById('ov-stats').innerHTML=`<b>${moves}</b> moves · <b>${pad2(Math.floor(t/60))}:${pad2(t%60)}</b>`+(nb?'<br><span style="color:#00ff64;font-size:11px;letter-spacing:2px">★ NEW BEST ★</span>':'');
  const sn=lvl<LEVELS.length-1;
  document.getElementById('next-btn').style.display=sn?'':'none';
  document.getElementById('next-btn2').style.display=sn?'':'none';
  document.getElementById('overlay').classList.add('show');
}
function nextLevel(){if(lvl<LEVELS.length-1){lvl++;updateLvlBtns();init();}}

function draw(){
  const c=ctx,CS=CELL,W=canvas.width,H=canvas.height;
  // Rich dark green bg
  const bg=c.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#030806');bg.addColorStop(.5,'#050c08');bg.addColorStop(1,'#030806');
  c.fillStyle=bg;c.fillRect(0,0,W,H);

  // Grid
  c.strokeStyle='rgba(0,255,100,0.05)';c.lineWidth=.4;
  for(let x=0;x<W;x+=CS){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
  for(let y=0;y<H;y+=CS){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}

  // Trail — gradient from cyan to yellow
  for(let i=0;i<trail.length;i++){
    const t=trail[i],pct=i/trail.length;
    const r=Math.round(pct*255),g2=Math.round(200+55*pct),b=Math.round(200*(1-pct));
    c.fillStyle=`rgba(${r},${g2},${b},${pct*.3})`;
    c.beginPath();c.arc(t.x*CS+CS/2,t.y*CS+CS/2,CS*.2,0,Math.PI*2);c.fill();
  }

  // Start highlight
  const sg=c.createRadialGradient(CS/2,CS/2,0,CS/2,CS/2,CS*.9);
  sg.addColorStop(0,'rgba(0,255,100,0.25)');sg.addColorStop(1,'rgba(0,255,100,0)');
  c.fillStyle=sg;c.fillRect(0,0,CS,CS);

  // Exit glow — golden
  const ex=(cols-1)*CS,ey=(rows-1)*CS;
  const eg=c.createRadialGradient(ex+CS/2,ey+CS/2,0,ex+CS/2,ey+CS/2,CS*1.2);
  eg.addColorStop(0,'rgba(255,200,0,0.5)');eg.addColorStop(.5,'rgba(255,100,0,0.2)');eg.addColorStop(1,'rgba(255,200,0,0)');
  c.fillStyle=eg;c.fillRect(ex-CS*.2,ey-CS*.2,CS*1.4,CS*1.4);

  // Walls — vivid neon green with glow
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    const cell=grid[y][x],x0=x*CS,y0=y*CS;
    const dw=(x1,y1,x2,y2)=>{
      c.shadowColor='rgba(0,255,100,0.6)';c.shadowBlur=5;
      c.strokeStyle='#003a15';c.lineWidth=2.5;
      c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();
      c.shadowBlur=0;c.strokeStyle='#00aa40';c.lineWidth=1;
      c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();
    };
    if(cell.n)dw(x0,y0,x0+CS,y0);if(cell.w)dw(x0,y0,x0,y0+CS);
    if(y===rows-1&&cell.s)dw(x0,y0+CS,x0+CS,y0+CS);if(x===cols-1&&cell.e)dw(x0+CS,y0,x0+CS,y0+CS);
  }

  // Exit — pulsing gold star
  const pulse=.6+.4*Math.sin(Date.now()/250);
  const exitHue=(Date.now()/6)%60+30; // gold range
  c.save();
  c.font=`${Math.max(10,Math.round(CS*.6))}px sans-serif`;c.textAlign='center';c.textBaseline='middle';
  c.shadowColor=`hsla(${exitHue},100%,60%,0.9)`;c.shadowBlur=18*pulse;
  c.globalAlpha=.7+.3*pulse;
  c.fillText('★',ex+CS/2,ey+CS/2);
  c.restore();

  // Player — pulsing cyan orb
  const ppx=px*CS+CS/2,ppy=py*CS+CS/2;
  const pHue=(Date.now()/5)%360;
  const pCol=`hsl(${pHue},100%,60%)`;
  const pPulse=.8+.2*Math.sin(Date.now()/180);

  // Outer ring
  c.beginPath();c.arc(ppx,ppy,CS*.44,0,Math.PI*2);
  c.strokeStyle=`hsla(${pHue},100%,60%,${.25*pPulse})`;c.lineWidth=2;c.stroke();

  // Glow halo
  const pg=c.createRadialGradient(ppx,ppy,0,ppx,ppy,CS*.45);
  pg.addColorStop(0,`hsla(${pHue},100%,65%,0.5)`);pg.addColorStop(1,'transparent');
  c.fillStyle=pg;c.beginPath();c.arc(ppx,ppy,CS*.45,0,Math.PI*2);c.fill();

  // Core
  c.shadowColor=pCol;c.shadowBlur=14*pPulse;
  const pc=c.createRadialGradient(ppx-CS*.08,ppy-CS*.08,0,ppx,ppy,CS*.28);
  pc.addColorStop(0,'#ffffff');pc.addColorStop(.4,pCol);pc.addColorStop(1,`hsl(${pHue+40},100%,35%)`);
  c.fillStyle=pc;c.beginPath();c.arc(ppx,ppy,CS*.28,0,Math.PI*2);c.fill();
  c.shadowBlur=0;
}

// Controls
document.addEventListener('keydown',e=>{
  const m={ArrowUp:[0,-1],w:[0,-1],W:[0,-1],ArrowDown:[0,1],s:[0,1],S:[0,1],ArrowLeft:[-1,0],a:[-1,0],A:[-1,0],ArrowRight:[1,0],d:[1,0],D:[1,0]};
  if(m[e.key]){e.preventDefault();move(...m[e.key]);}
});
['up','down','left','right'].forEach(k=>{
  const d={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[k];
  const btn=document.getElementById('btn-'+k);
  btn.addEventListener('touchstart',e=>{e.preventDefault();move(...d);},{passive:false});
  btn.onclick=()=>move(...d);
});
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{e.preventDefault();tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)<5&&Math.abs(dy)<5)return;if(Math.abs(dx)>Math.abs(dy))move(dx>0?1:-1,0);else move(0,dy>0?1:-1);},{passive:false});

window.addEventListener('resize',()=>init());
(function loop(){requestAnimationFrame(loop);draw();})();
init();
</script>
</body>
</html>
